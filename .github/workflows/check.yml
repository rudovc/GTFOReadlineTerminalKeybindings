name: Check

on:
  push:
  pull_request:
    types: [opened]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '6.0.x'
      - run: dotnet format whitespace --verify-no-changes
      - run: dotnet test
